AWSTemplateFormatVersion: "2010-09-09"
Description: ClinGuide — IAM roles for ECS tasks

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  SecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing API keys
  S3BucketArn:
    Type: String
    Description: ARN of the S3 bucket for SPL data

Resources:
  # --- Task Execution Role (used by ECS agent to pull images, read secrets) ---
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub clinguide-${Environment}-task-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref SecretArn

  # --- Task Role (used by the application container itself) ---
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub clinguide-${Environment}-task
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource:
                  - !Ref S3BucketArn
                  - !Sub "${S3BucketArn}/*"
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0"

Outputs:
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
    Export:
      Name: !Sub clinguide-${Environment}-TaskExecutionRoleArn
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
    Export:
      Name: !Sub clinguide-${Environment}-TaskRoleArn
