AWSTemplateFormatVersion: "2010-09-09"
Description: ClinGuide — Secrets Manager for API keys

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Resources:
  APIKeysSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub clinguide/${Environment}/api-keys
      Description: API keys for ClinGuide (Anthropic, OpenAI, Cohere, Pinecone)
      SecretString: '{"CLINGUIDE_ANTHROPIC_API_KEY":"REPLACE_ME","CLINGUIDE_OPENAI_API_KEY":"REPLACE_ME","CLINGUIDE_COHERE_API_KEY":"REPLACE_ME","CLINGUIDE_PINECONE_API_KEY":"REPLACE_ME"}'
      Tags:
        - Key: Project
          Value: clinguide

Outputs:
  SecretArn:
    Value: !Ref APIKeysSecret
    Export:
      Name: !Sub clinguide-${Environment}-SecretArn
